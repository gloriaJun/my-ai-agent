services:
  nginx-proxy:
    image: "jc21/nginx-proxy-manager:latest"
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80" # 외부 HTTP 접속
      - "443:443" # 외부 HTTPS 접속
      - "81:81" # NPM 관리자 페이지
    environment:
      - TZ=Asia/Seoul
    volumes:
      - ./data/nginx/config:/data
      - ./data/nginx/letsencrypt:/etc/letsencrypt
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default

  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   environment:
  #     TZ: Asia/Seoul
  #   volumes:
  #     - ./data/ollama:/root/.ollama
  #   ports:
  #     - "11434:11434"
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 16G
  #       reservations:
  #         memory: 4G
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "50m"
  #       max-file: "3"
  #   restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    # ports:
    # - "5678:5678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: Asia/Seoul
      N8N_LOG_LEVEL: info
      # N8N_PATH: ${N8N_BASE_PATH:-/}
      OLLAMA_HOST: http://host.docker.internal:11434
      WEBHOOK_URL: ${WEBHOOK_URL}
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ~/my-ai-agent:/workspace/my-ai-agent:ro
      # - ~/Documents/GitHubPrivate:/workspace
      # - ~/Documents/GitHubPrivate/my-ai-agent:/workspace/my-ai-agent:ro
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped
    # depends_on:
    #   - ollama

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    # ports:
    #   - "18789:18789"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: Asia/Seoul
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      DEFAULT_MODEL: "gemma4:e4b"
      BASE_PATH: ${OPENCLAW_BASE_PATH:-/}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      DISCORD_BOOKING_BOT_TOKEN: ${DISCORD_BOOKING_BOT_TOKEN}
      OPENCLAW_GATEWAY_MODE: local
      OPENCLAW_GATEWAY_BIND: 0.0.0.0
    volumes:
      - ./config/openclaw.json:/home/node/.openclaw/openclaw.json
      - ./data/openclaw:/home/node/.openclaw
      # - ~/Documents/GitHubPrivate:/workspace
      # - ~/Documents/GitHubPrivate/my-ai-agent:/workspace/my-ai-agent:ro
      - ~/my-ai-agent:/workspace/my-ai-agent:ro
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    # depends_on:
    #   - ollama

networks:
  default:
    external: true
    name: ai-agent-network
