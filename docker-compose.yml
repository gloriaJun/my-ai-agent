  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    # ports:
    # - "5678:5678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      N8N_LOG_LEVEL: info
      OLLAMA_HOST: http://host.docker.internal:11434
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_TRUST_PROXY: true
    volumes:
      - ./data/n8n:/home/node/.n8n
      # - ~/Documents/GitHubPrivate:/workspace
      # - ~/Documents/GitHubPrivate/my-ai-agent:/workspace/my-ai-agent:ro
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped
    # depends_on:
    #   - ollama

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    # ports:
    #   - "18789:18789"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      DEFAULT_MODEL: "llama3.2:3b"
    volumes:
      - ./data/openclaw:/home/node/.openclaw
      - ./.env:/home/node/.openclaw/.env:ro
      # - ~/Documents/GitHubPrivate:/workspace
      # - ~/Documents/GitHubPrivate/my-ai-agent:/workspace/my-ai-agent:ro
    command: ["openclaw", "gateway", "run"]
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    # depends_on:
    #   - ollama

networks:
  default:
    external: true
    name: proxy-net
