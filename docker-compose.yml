  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      TZ: Asia/Seoul
      N8N_LOG_LEVEL: info
      OLLAMA_HOST: http://host.docker.internal:11434
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ~/Documents/GitHubPrivate:/workspace
      - ~/Documents/GitHubPrivate/my-ai-agent:/workspace/my-ai-agent:ro
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped
    # depends_on:
    #   - ollama

  n8n-work:
    image: n8nio/n8n:latest
    container_name: n8n-work
    ports:
      - "5679:5678" # 개인용(5678)과 충돌 방지를 위해 5679 사용
    environment:
      - TZ=Asia/Seoul
      - N8N_LOG_LEVEL=info
      - OLLAMA_HOST=http://host.docker.internal:11434 # 기존 ai-agent-network의 ollama 호출
      - N8N_BLOCK_FS_WRITE_ACCESS=false
    volumes:
      - ./data-work/n8n:/home/node/.n8n
      - ~/Documents/GitHubWork:/workspace
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped
    # depends_on:
    #   - ollama

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    ports:
      - "18789:18789"
    environment:
      TZ: Asia/Seoul
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      DEFAULT_MODEL: "gemma4:e4b-it-q4_K_M"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      DISCORD_BOOKING_BOT_TOKEN: ${DISCORD_BOOKING_BOT_TOKEN}
      OPENCLAW_GATEWAY_MODE: local
      OPENCLAW_GATEWAY_BIND: lan
    volumes:
      - ./data/openclaw:/home/node/.openclaw
      - ~/Documents/GitHubPrivate:/workspace
      - ~/Documents/GitHubPrivate/my-ai-agent:/workspace/my-ai-agent:ro
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    # depends_on:
    #   - ollama

networks:
  default:
    name: ai-agent-network
