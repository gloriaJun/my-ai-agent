services:
  n8n-work:
    image: n8nio/n8n:latest
    container_name: n8n-work
    ports:
      - "5679:5678" # 개인용(5678)과 충돌 방지를 위해 5679 사용
    environment:
      - TZ=Asia/Seoul
      - N8N_LOG_LEVEL=info
      - OLLAMA_HOST=http://host.docker.internal:11434 # 기존 ai-agent-network의 ollama 호출
      - N8N_BLOCK_FS_WRITE_ACCESS=false
    volumes:
      - ./data-work/n8n:/home/node/.n8n
      - ~/Documents/GitHubWork:/workspace
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped
    # depends_on:
    #   - ollama

